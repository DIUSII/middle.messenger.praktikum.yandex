<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="../../assets/styles/globalStyles.css">
    <title>Авторизация</title>
  </head>
  <body class="sign-in">
    <main class="container">
      <div class="form">
        <h2 class="form__title">Вход</h2>
        <div class="form__container sing-in__form-container">
          <label class="input">
            <span class="input__title">Логин</span>
            <input type="text" class="input__field" value="login" name="login">
            <span class="input__error">Неверный логин</span>
          </label>
          <label class="input">
            <span class="input__title">Пароль</span>
            <input type="password" class="input__field" value="password" name="password">
            <span class="input__error">Неверный пароль</span>
          </label>
        </div>
        <button class="btn">Авторизоваться</button>
        <a class="link" href="/pages/signIn/">Нет аккаунта?</a>
      </div>
    </main>
  </body>
</html>
